name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: biblioteca_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r biblioteca_python/requirements.txt
        pip install pytest pytest-cov pytest-flask

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 biblioteca_python --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 biblioteca_python --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests
      env:
        DB_HOST: localhost
        DB_USER: root
        DB_PASS: root
        DB_NAME: biblioteca_test
        FLASK_ENV: testing
      run: |
        pytest tests/ -v --cov=biblioteca_python --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t biblioteca:latest .

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push to Docker Hub
      run: |
        docker tag biblioteca:latest ${{ secrets.DOCKER_USERNAME }}/biblioteca:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/biblioteca:latest
