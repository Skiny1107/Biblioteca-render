{% extends 'base.html' %}
{% block title %}Préstamos{% endblock %}
{% block content %}
<div class="app-title">
    <div><h1><i class="fa fa-hourglass-start"></i> Préstamos</h1></div>
    <div class="app-title-actions">
        <button class="btn btn-primary mb-2" onclick="frmPrestamo()"><i class="fa fa-plus"></i> Nuevo</button>
        <a class="btn btn-sm btn-export btn-pdf mb-2" href="/Prestamos/pdf" target="_blank"><i class="fa fa-file-pdf-o"></i> PDF</a>
        <a class="btn btn-sm btn-export btn-excel mb-2" href="/Prestamos/excel"><i class="fa fa-file-excel-o"></i> Excel</a>
        <a class="btn btn-sm btn-export btn-word mb-2" href="/Prestamos/word"><i class="fa fa-file-word-o"></i> Word</a>
    </div>
</div>
<div class="row"><div class="col-lg-12"><div class="tile"><div class="tile-body">
    <div class="table-responsive">
        <table class="table table-bordered table-hover" id="tblPrestamos">
            <thead class="thead-dark">
                <tr><th>Id</th><th>Estudiante</th><th>Libro</th><th>F. Préstamo</th><th>F. Devolución</th><th>Cant.</th><th>Estado</th><th></th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div></div></div></div>

<div id="modal_prestamo" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary">
                <h5 class="modal-title text-white">Nuevo Préstamo</h5>
                <button class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <form id="frmPrestamo">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group"><label>Estudiante</label>
                                <select class="form-control select2" name="estudiante" id="estSelect"></select></div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group"><label>Libro</label>
                                <select class="form-control select2" name="libro" id="libroSelect"></select></div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group"><label>Cantidad Disponible</label>
                                <input class="form-control" type="number" id="cantDisponible" readonly></div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group"><label>Cantidad a Prestar</label>
                                <input class="form-control" type="number" name="cantidad" id="cantPrestamo" min="1"></div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group"><label>Fecha Préstamo</label>
                                <input class="form-control" type="date" name="fecha_prestamo"></div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group"><label>Fecha Devolución</label>
                                <input class="form-control" type="date" name="fecha_devolucion"></div>
                        </div>
                    </div>
                    <div class="form-group"><label>Observación</label>
                        <textarea class="form-control" name="observacion" rows="2"></textarea></div>
                    <button class="btn btn-primary" type="button" onclick="registrarPrestamo(event)">Registrar</button>
                    <button class="btn btn-danger" type="button" data-dismiss="modal">Cancelar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var tablePrestamos = $('#tblPrestamos').DataTable({
    ajax: { url: '/Prestamos/listar', dataSrc: '' },
    columns: [
        { data: 'pres_id' }, { data: 'est_nombre' }, { data: 'titulo' },
        { data: 'fecha_prestamo' }, { data: 'fecha_devolucion' }, { data: 'cantidad' },
        { data: null, render: function(d) {
            return d.estadoLabel==='Prestado' ? '<span class="badge badge-warning">Prestado</span>' : '<span class="badge badge-success">Entregado</span>';
        }},
        { data: null, render: function(d) {
            if (d.estado===1) return '<button class="btn btn-success btn-sm" onclick="entregarLibro('+d.pres_id+')"><i class="fa fa-check"></i> Entregar</button> '+
                '<button class="btn btn-info btn-sm" onclick="verTicked('+d.pres_id+')"><i class="fa fa-ticket"></i></button>';
            return '';
        }}
    ]
});

function frmPrestamo() {
    $('#frmPrestamo')[0].reset();
    $('#estSelect').select2({ dropdownParent: $('#modal_prestamo'), ajax:{ url:'/Estudiantes/buscarEstudiante', data:function(p){ return {es:p.term}; }, processResults:function(d){ return {results:d}; } } });
    $('#libroSelect').select2({ dropdownParent: $('#modal_prestamo'), ajax:{ url:'/Libros/buscarLibro', data:function(p){ return {lb:p.term}; }, processResults:function(d){ return {results:d}; } } });
    $('#libroSelect').on('change', function() {
        var id = $(this).val();
        if(id) $.get('/Libros/verificar/'+id, function(r){ $('#cantDisponible').val(r.cantidad); });
    });
    $('#modal_prestamo').modal('show');
}

function registrarPrestamo(e) {
    e.preventDefault();
    $.post('/Prestamos/registrar', $('#frmPrestamo').serialize(), function(res) {
        swal(res.msg,'',res.icono);
        if(res.icono==='success'){ $('#modal_prestamo').modal('hide'); tablePrestamos.ajax.reload(); }
    });
}

function entregarLibro(id) {
    swal({title:'¿Registrar entrega?',icon:'warning',buttons:true}).then(function(ok){
        if(ok) $.get('/Prestamos/entregar/'+id, function(r){ swal(r.msg,'',r.icono); tablePrestamos.ajax.reload(); });
    });
}

function verTicked(id) {
    $.get('/Prestamos/ticked/'+id, function(d) {
        swal('Préstamo #'+d.pres_id, d.est_nombre +' - '+d.titulo+'\nFecha: '+d.fecha_prestamo, 'info');
    });
}
</script>
{% endblock %}
